<!DOCTYPE html><html><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:wght@600;700&display=swap" rel="stylesheet">
<style>
  body{margin:0}
  .og{width:1200px;height:630px;background:linear-gradient(160deg,#fdeede,#fff8f0);display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Nunito',sans-serif;box-sizing:border-box;border:14px solid #fff}
  .emoji{font-size:96px}
  h1{font-family:'Baloo 2',sans-serif;font-weight:800;font-size:96px;margin:10px 0 4px;color:#43291c}
  .b{color:#e5477d}.g{color:#3f9d6b}.y{color:#f2b705}
  .tag{font-weight:700;font-size:30px;color:#7d6a5c;letter-spacing:1px}
  .sub{margin-top:20px;font-weight:700;color:#3f9d6b;font-size:26px}
</style></head>
<body><div class="og">
  <div class="emoji">🍩🍜🥯☕</div>
  <h1><span class="b">Donuts.</span> <span class="g">Pho.</span> <span class="y">Bagels.</span></h1>
  <div class="tag">Craft donuts · Authentic pho · Real coffee</div>
  <div class="sub">New Bern, NC · donutsphobagel.com</div>
</div></body></html>
